name: CD - Production

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_ACTION_TOKEN }}
          submodules: true

      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Build & Push
        run: |
          echo "🔵 [PROD] Building Docker image"
          docker build -f ./docker/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ github.sha }} .

          echo "🔵 [PROD] Pushing Docker image"
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose-prod.yml to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/docker-compose-prod.yml"
          target: "~/app"

      - name: Deploy on Production Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app/docker

            echo "🔵 [PROD] .env 생성 중..."
            printf "${{ secrets.ENV_FILE }}" > .env

            echo "🔵 [PROD] PostgreSQL 상태 확인 중..."
            DB_STATUS=$(docker inspect -f '{{.State.Status}}' $(docker compose -f docker-compose-prod.yml ps -q db 2>/dev/null) 2>/dev/null || echo "not_found")

            if [ "$DB_STATUS" = "running" ]; then
              echo "🟡 [PROD] DB running → app만 재기동"
              docker compose -f docker-compose-prod.yml pull app
              docker compose -f docker-compose-prod.yml up -d --no-deps app
            else
              echo "🟢 [PROD] DB not running → 전체 스택 기동"
              docker compose -f docker-compose-prod.yml pull
              docker compose -f docker-compose-prod.yml up -d
            fi

            echo "🔵 [PROD] 사용하지 않는 이미지 정리"
            docker image prune -f

            echo "✅ [PROD] 배포 완료!"